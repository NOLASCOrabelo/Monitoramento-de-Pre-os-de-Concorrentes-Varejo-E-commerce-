version: '3.8'

services:
  sync-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: sync-secure-cloud:latest
    container_name: sync_secure_cloud
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - ./sync_blockchain.log:/app/sync_blockchain.log
